{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GRMS | FUUAST</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar" id="navbar">
    <div class="nav-left">
        <img src="{% static 'images/logo.png' %}" alt="GRMS Logo" class="logo">
        <span class="brand-name">GRMS</span>
    </div>
    <div class="nav-right">
        <a href="{% url 'home' %}" class="nav-link">Home</a>
        <a href="{% url 'home' %}#about" class="nav-link">About</a>
        <a href="{% url 'home' %}#features" class="nav-link">Features</a>
        <a href="{% url 'home' %}#help" class="nav-link">Help</a>
        <a href="{% url 'login' %}" class="login-btn active">
            <i class="fas fa-sign-in-alt"></i>
            <span>Login</span>
        </a>
    </div>
    
    <!-- Mobile Menu Button -->
    <button class="mobile-menu-btn" id="mobileMenuBtn">
        <i class="fas fa-bars"></i>
    </button>
</nav>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobileMenu">
    <a href="{% url 'home' %}" class="mobile-link">Home</a>
    <a href="{% url 'home' %}#about" class="mobile-link">About</a>
    <a href="{% url 'home' %}#features" class="mobile-link">Features</a>
    <a href="{% url 'home' %}#help" class="mobile-link">Help</a>
    <a href="{% url 'login' %}" class="mobile-login">Login</a>
</div>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobileMenu">
    <a href="{% url 'home' %}" class="mobile-link">Home</a>
    <a href="{% url 'home' %}#about" class="mobile-link">About</a>
    <a href="{% url 'home' %}#features" class="mobile-link">Features</a>
    <a href="{% url 'home' %}#help" class="mobile-link">Help</a>
    <a href="{% url 'login' %}" class="mobile-login">Login</a>
</div>

<!-- ===== LOGIN FORM ===== -->
<div class="auth-container">
    <div class="auth-card" data-aos="fade-up">
        <div class="auth-header">
            <h3>Sign In to GRMS</h3>
            <p>Access your research dashboard</p>
        </div>
        
        <form method="post" class="auth-form" id="loginForm">
            {% csrf_token %}
            
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="username" placeholder="Username" required>
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>
            
            <button type="submit" class="auth-btn">
                <i class="fas fa-sign-in-alt"></i>
                Sign In
            </button>
        </form>
        
        <div class="auth-footer">
            <p>New to GRMS? <a href="{% url 'register' %}">Create account</a></p>
            <a href="#" class="forgot-password">Forgot password?</a>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="{% static 'js/auth.js' %}"></script>

<script>
    AOS.init({
        duration: 1000,
        once: true
    });
</script>
</body>
</html>
