{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GRMS | Login</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
    <div class="nav-left">
        <img src="{% static 'images/fuuast_logo.png' %}" alt="FUUAST Logo">
        <span>Graduate Research Management System</span>
    </div>

    <div class="nav-right">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Help</a>
        <a href="#">Contact</a>
    </div>
</nav>

<!-- ===== MAIN LOGIN AREA ===== -->
<div class="page-wrapper">

    <div class="login-card">
        <img src="{% static 'images/fuuast_logo.png' %}" class="login-logo" alt="Logo">

        <h2>GRMS Portal</h2>
        <p class="sub">Sign in with your university credentials</p>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>
    </div>

</div>

<!-- ===== FOOTER ===== -->
<footer class="footer">
    © 2026 FUUAST | Graduate Research Management System
</footer>

</body>
</html>
