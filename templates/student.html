{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard | GRMS</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>

<body class="student-theme">

<!-- ===== TOP NAV ===== -->
<div class="topbar">
    <h2>GRMS – Student Portal</h2>
    <div class="top-right">
        <span>{{ request.user.username }}</span>
        <a href="{% url 'logout' %}" class="logout">Logout</a>
    </div>
</div>

<!-- ===== MAIN LAYOUT ===== -->
<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="#">Dashboard</a>
        <a href="#">Submit Proposal</a>
        <a href="#">My Supervisor</a>
        <a href="#">Research Progress</a>
        <a href="#">Feedback</a>
        <a href="#">Documents</a>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <h1>Welcome, Student</h1>

        <div class="cards">
            <div class="card">📄 Proposal Status</div>
            <div class="card">👨‍🏫 Supervisor Assigned</div>
            <div class="card">📊 Progress Updates</div>
            <div class="card">💬 Feedback</div>
        </div>
    </div>

</div>

</body>
</html>
