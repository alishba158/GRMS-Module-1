{% extends 'supervisor/base.html' %}
{% load static %}

{% block title %}Update Profile - Supervisor{% endblock %}
{% block page_title %}Update Profile{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5><i class="fas fa-user-edit"></i> Edit Profile Information</h5>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Department</label>
                    <input type="text" name="department" class="form-control" value="{{ supervisor.department }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Designation</label>
                    <input type="text" name="designation" class="form-control" value="{{ supervisor.designation }}">
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Availability Status</label>
                <select name="availability" class="form-control">
                    <option value="Available" {% if supervisor.availability_status == 'Available' %}selected{% endif %}>Available</option>
                    <option value="Not Available" {% if supervisor.availability_status == 'Not Available' %}selected{% endif %}>Not Available</option>
                    <option value="On Leave" {% if supervisor.availability_status == 'On Leave' %}selected{% endif %}>On Leave</option>
                </select>
            </div>
            
            <div class="mt-4">
                <button type="submit" class="btn-action">
                    <i class="fas fa-save"></i> Save Changes
                </button>
                <a href="{% url 'supervisor_dashboard' %}" class="btn btn-secondary ms-2">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
