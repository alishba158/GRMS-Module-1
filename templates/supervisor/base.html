{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>{% block title %}Supervisor - GRMS{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/supervisor.css' %}">
    <style>
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100%;
            background: #1b5e20;
            color: white;
            z-index: 9999;
            overflow-y: auto;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: #1b5e20;
            flex-shrink: 0;
            white-space: nowrap;
            overflow: hidden;
        }
        .sidebar-header h4 {
            font-size: 1.3rem;
            margin: 0;
            color: white;
        }
        .nav-menu {
            flex: 1;
            padding: 10px 0;
        }
        .nav-menu a {
            display: block;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            padding: 10px 20px;
            transition: 0.3s;
        }
        .nav-menu a:hover {
            background: rgba(255,255,255,0.1);
            padding-left: 25px;
        }
        .nav-menu a i {
            width: 25px;
            margin-right: 8px;
        }
        /* Logout button style - same as menu items */
        .logout-menu-item {
            display: block;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            padding: 10px 20px;
            transition: 0.3s;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .logout-menu-item:hover {
            background: #e74c3c !important;
            padding-left: 25px;
            color: white;
        }
        .logout-menu-item i {
            width: 25px;
            margin-right: 8px;
        }
        .main-content {
            margin-left: 260px;
            padding: 20px;
        }
        .header h1 {
            color: #1b5e20;
            font-size: 1.8rem;
            border-bottom: 3px solid #c6a15b;
            display: inline-block;
            padding-bottom: 5px;
        }
        #mobileToggle {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 10000;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 1.3rem;
        }
        @media (max-width: 768px) {
            #mobileToggle { display: flex; align-items: center; justify-content: center; }
            .sidebar { transform: translateX(-100%); width: 75%; max-width: 280px; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 15px; padding-top: 70px; }
            .header h1 { font-size: 1.2rem; display: block; text-align: center; }
            .sidebar-header h4 {
                font-size: 0.9rem;
                white-space: normal;
                word-break: break-word;
            }
        }
        @media (min-width: 769px) {
            .sidebar { transform: translateX(0) !important; }
            #mobileToggle { display: none !important; }
        }
    </style>
</head>
<body>

<button id="mobileToggle">☰</button>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h4>GRMS Supervisor</h4>
    </div>
    <div class="nav-menu">
        <a href="{% url 'supervisor_dashboard' %}"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="{% url 'supervisor_synopsis_list' %}"><i class="fas fa-file-alt"></i> Synopsis</a>
        <a href="{% url 'supervisor_thesis_list' %}"><i class="fas fa-scroll"></i> Thesis</a>
        <a href="{% url 'supervisor_meeting_list' %}"><i class="fas fa-calendar-check"></i> Meetings</a>
        <a href="{% url 'supervisor_extension_list' %}"><i class="fas fa-hourglass-half"></i> Extensions</a>
        <a href="{% url 'supervisor_progress_list' %}"><i class="fas fa-chart-line"></i> Progress Reports</a>
        <a href="{% url 'supervisor_profile_update' %}"><i class="fas fa-user-cog"></i> Profile</a>
        
        <!-- LOGOUT BUTTON - DIRECTLY BELOW PROFILE -->
        <form method="post" action="{% url 'logout' %}" style="margin: 0; padding: 0;">
            {% csrf_token %}
            <button type="submit" class="logout-menu-item">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </form>
    </div>
</div>

<div class="main-content">
    <div class="header">
        <h1>{% block page_title %}Supervisor Dashboard{% endblock %}</h1>
    </div>
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('mobileToggle')?.addEventListener('click', function() {
        document.getElementById('sidebar').classList.toggle('active');
    });
</script>
</body>
</html>
