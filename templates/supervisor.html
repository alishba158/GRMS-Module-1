{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Supervisor Dashboard | GRMS</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>

<body class="supervisor-theme">

<!-- TOP BAR -->
<div class="topbar">
    <h2>GRMS – Supervisor Panel</h2>
    <div class="top-right">
        <span>{{ request.user.username }}</span>
        <a href="{% url 'logout' %}" class="logout">Logout</a>
    </div>
</div>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="#">Dashboard</a>
        <a href="#">My Students</a>
        <a href="#">Review Proposals</a>
        <a href="#">Give Feedback</a>
        <a href="#">Approve Progress</a>
        <a href="#">Meetings</a>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <h1>Supervisor Overview</h1>

        <div class="cards">
            <div class="card">👥 Assigned Students</div>
            <div class="card">📝 Pending Proposals</div>
            <div class="card">✔ Approved Research</div>
            <div class="card">📅 Meetings</div>
        </div>
    </div>

</div>

</body>
</html>
