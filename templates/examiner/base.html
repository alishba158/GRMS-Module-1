{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Examiner - GRMS{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- AOS Animation Library (local ya CDN) -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <style>
        /* ===== EXAMINER DASHBOARD CSS (EMBEDDED) ===== */
        :root {
            --primary-blue: #2980b9;
            --secondary-blue: #3498db;
            --dark-blue: #1c598a;
            --accent-orange: #e67e22;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --light-bg: #f8fafc;
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.1);
            --shadow-hover: 0 12px 30px rgba(0,0,0,0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--light-bg);
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 240px;
            height: 100vh;
            background: linear-gradient(180deg, #2980b9, #1c598a);
            color: white;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            animation: slideInLeft 0.6s ease;
        }

        @keyframes slideInLeft {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .sidebar-header {
            padding: 1.8rem 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-header h4 {
            font-weight: 700;
            margin: 0;
            font-size: 1.5rem;
        }

        .nav-menu {
            flex: 1;
            padding: 1.5rem 0;
        }

        .nav-menu a {
            display: block;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            padding: 0.8rem 1.8rem;
            transition: 0.3s;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .nav-menu a i {
            margin-right: 0.5rem;
            width: 20px;
        }

        .nav-menu a:hover {
            background: rgba(255,255,255,0.1);
            padding-left: 2.2rem;
        }

        .nav-menu a.active {
            background: rgba(255,255,255,0.2);
            border-left: 4px solid #f1c40f;
        }

        .logout-container {
            padding: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .logout-btn {
            width: 100%;
            padding: 0.7rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            color: white;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: 0.3s;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .logout-btn:hover {
            background: var(--danger);
            border-color: var(--danger);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(231,76,60,0.3);
        }

        /* Main Content */
        .main-content {
            margin-left: 240px;
            padding: 2rem;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            margin-bottom: 2rem;
        }

        .header h1 {
            color: var(--dark-blue);
            font-weight: 700;
            font-size: 2.2rem;
            position: relative;
            display: inline-block;
        }

        .header h1::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #3498db, #e67e22);
            border-radius: 2px;
        }

        /* Welcome Message */
        .welcome-message {
            background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue));
            color: white;
            padding: 2rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
        }

        .welcome-message h3 {
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .welcome-message p {
            opacity: 0.9;
            margin: 0;
        }

        /* Stats Cards */
        .stats-grid {
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .stat-card.primary .stat-icon {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }

        .stat-card.success .stat-icon {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
        }

        .stat-details {
            flex: 1;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.2;
        }

        .stat-label {
            color: var(--text-light);
            font-weight: 500;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 15px;
            border: none;
            box-shadow: var(--shadow-sm);
            margin-bottom: 1.5rem;
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
        }

        .card-header {
            background: linear-gradient(135deg, #34495e, #2c3e50);
            color: white;
            padding: 1.2rem 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: none;
        }

        .card-header i {
            font-size: 1.2rem;
        }

        .card-header .badge {
            margin-left: auto;
            font-size: 0.8rem;
            padding: 0.4rem 0.8rem;
        }

        .pending-card .card-header {
            background: linear-gradient(135deg, #e67e22, #d35400);
        }

        .submitted-card .card-header {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
        }

        .card-body {
            padding: 1.5rem;
        }

        /* Evaluation Items */
        .evaluation-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
        }

        .item-content {
            flex: 1;
        }

        .item-content h6 {
            margin-bottom: 0.3rem;
            color: var(--text-dark);
            font-weight: 600;
        }

        .item-content p {
            margin-bottom: 0.2rem;
            font-size: 0.9rem;
        }

        .submission-info {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .marks {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        hr {
            margin: 0.5rem 0;
            opacity: 0.1;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
        }

        .empty-icon {
            font-size: 4rem;
            color: #d5dbdb;
            margin-bottom: 1rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .empty-state h6 {
            color: var(--text-dark);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--text-light);
            margin-bottom: 1rem;
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue));
            border: none;
            border-radius: 25px;
            padding: 0.4rem 1.2rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(52,152,219,0.3);
        }

        .btn-outline-primary {
            color: var(--primary-blue);
            border-color: var(--primary-blue);
            border-radius: 25px;
            padding: 0.3rem 1rem;
            transition: all 0.3s ease;
        }

        .btn-outline-primary:hover {
            background: var(--primary-blue);
            color: white;
            transform: translateY(-2px);
        }

        /* Badges */
        .badge {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-weight: 500;
            font-size: 0.75rem;
        }

        .badge.bg-warning {
            background: #f39c12 !important;
            color: #2c3e50;
        }

        .badge.bg-success {
            background: #27ae60 !important;
        }

        .badge.bg-info {
            background: #3498db !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 1000;
                transition: transform 0.3s ease;
            }
            .sidebar.active {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 1rem;
            }
            .stat-card {
                padding: 1rem;
            }
            .stat-icon {
                width: 45px;
                height: 45px;
                font-size: 1.4rem;
            }
            .stat-value {
                font-size: 1.5rem;
            }
            .evaluation-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
            .evaluation-item .btn {
                align-self: flex-start;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h4>GRMS Examiner</h4>
        </div>
        <div class="nav-menu">
            <a href="{% url 'examiner_dashboard' %}" class="{% if request.resolver_match.url_name == 'examiner_dashboard' %}active{% endif %}">
                <i class="fas fa-tachometer-alt"></i> Dashboard
            </a>
        </div>
        <div class="logout-container">
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <h1>{% block page_title %}Examiner Dashboard{% endblock %}</h1>
        </div>
        {% block content %}{% endblock %}
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 600, once: true, offset: 5 });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
