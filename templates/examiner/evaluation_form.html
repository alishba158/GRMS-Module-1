{% extends 'examiner/base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Submit Evaluation for {{ evaluation.thesis.title }}</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Submit</button>
        <a href="{% url 'examiner_dashboard' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
