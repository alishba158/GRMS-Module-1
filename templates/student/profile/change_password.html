{% extends 'student/base.html' %}
{% load static %}

{% block title %}Change Password - GRMS{% endblock %}
{% block page_title %}Change Password{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5><i class="fas fa-key"></i> Update Your Password</h5>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label">Old Password</label>
                <input type="password" name="old_password" class="form-control" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" name="new_password1" class="form-control" required>
                <small class="text-muted">Minimum 6 characters</small>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Confirm New Password</label>
                <input type="password" name="new_password2" class="form-control" required>
            </div>
            
            <div class="mt-4">
                <button type="submit" class="btn-action">
                    <i class="fas fa-sync-alt"></i> Change Password
                </button>
                <a href="{% url 'student_dashboard' %}" class="btn btn-secondary ms-2">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
