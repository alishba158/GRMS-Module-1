{% extends 'student/base.html' %}
{% block title %}Submit Progress Report - GRMS{% endblock %}
{% block page_title %}Submit Progress Report{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h5><i class="fas fa-upload"></i> Report Details</h5>
    </div>
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Semester</label>
                <input type="text" name="semester" class="form-control" placeholder="e.g., Fall 2025" required>
            </div>
            <div class="mb-3">
                <label class="form-label">File (PDF only)</label>
                <input type="file" name="file" class="form-control" accept=".pdf" required>
            </div>
            <button type="submit" class="btn-action"><i class="fas fa-paper-plane"></i> Submit</button>
            <a href="{% url 'student_progress_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
