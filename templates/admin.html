{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>GRMS | Admin Dashboard</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>

<body class="admin-theme">

<!-- ===== NAVBAR ===== -->
<nav class="dash-navbar">
    <div class="dash-left">
        <img src="{% static 'images/fuuast_logo.png' %}">
        <span>GRMS – Admin Panel</span>
    </div>

    <div class="dash-right">
        <span class="role-badge admin">ADMIN</span>
        <a href="{% url 'logout' %}" class="logout-btn">Logout</a>
    </div>
</nav>

<!-- ===== MAIN LAYOUT ===== -->
<div class="dashboard-container">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
        <h3>Administration</h3>

        <a href="#">Dashboard Overview</a>
        <a href="#">Manage Users</a>
        <a href="#">Assign Supervisors</a>
        <a href="#">Research Proposals</a>
        <a href="#">System Settings</a>
        <a href="#">Reports</a>
    </aside>

    <!-- ===== CONTENT ===== -->
    <main class="dashboard-content">

        <h1>Welcome, Admin</h1>
        <p class="subtitle">System monitoring & research management</p>

        <!-- ===== STAT CARDS ===== -->
        <div class="stats-grid">

            <div class="stat-card">
                <h2>Students</h2>
                <p>124</p>
            </div>

            <div class="stat-card">
                <h2>Supervisors</h2>
                <p>18</p>
            </div>

            <div class="stat-card">
                <h2>Proposals</h2>
                <p>46</p>
            </div>

            <div class="stat-card">
                <h2>Pending</h2>
                <p>9</p>
            </div>

        </div>

        <!-- ===== ACTION SECTION ===== -->
        <div class="admin-actions">
            <button>Approve Proposal</button>
            <button class="secondary">Create User</button>
            <button class="danger">System Logs</button>
        </div>

    </main>
</div>

</body>
</html>
