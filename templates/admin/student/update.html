{% extends 'admin/base.html' %}
{% load static %}

{% block title %}Update Student - Admin{% endblock %}
{% block page_title %}Update Student{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5><i class="fas fa-user-edit"></i> Edit Student: {{ student.user.get_full_name }}</h5>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" class="form-control" value="{{ student.user.first_name }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" class="form-control" value="{{ student.user.last_name }}">
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" value="{{ student.user.email }}" required>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Registration No</label>
                    <input type="text" name="registration_no" class="form-control" value="{{ student.registration_no }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Department</label>
                    <input type="text" name="department" class="form-control" value="{{ student.department }}">
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Session</label>
                    <input type="text" name="session" class="form-control" value="{{ student.session }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Program</label>
                    <input type="text" name="program" class="form-control" value="{{ student.program }}">
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Enrollment Status</label>
                    <select name="enrollment_status" class="form-control">
                        <option value="Active" {% if student.enrollment_status == 'Active' %}selected{% endif %}>Active</option>
                        <option value="Inactive" {% if student.enrollment_status == 'Inactive' %}selected{% endif %}>Inactive</option>
                        <option value="Completed" {% if student.enrollment_status == 'Completed' %}selected{% endif %}>Completed</option>
                        <option value="Withdrawn" {% if student.enrollment_status == 'Withdrawn' %}selected{% endif %}>Withdrawn</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Supervisor</label>
                    <select name="supervisor" class="form-control">
                        <option value="">-- None --</option>
                        {% for sup in supervisors %}
                            <option value="{{ sup.id }}" {% if student.supervisor.id == sup.id %}selected{% endif %}>
                                {{ sup.user.get_full_name }} ({{ sup.department }})
                            </option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <div class="mt-4">
                <button type="submit" class="btn-action">
                    <i class="fas fa-save"></i> Update Student
                </button>
                <a href="{% url 'admin_student_list' %}" class="btn btn-secondary ms-2">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
